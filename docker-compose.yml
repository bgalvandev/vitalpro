services:
  postgres:
    image: postgres:17-alpine
    container_name: vitalpro-postgres
    environment:
      POSTGRES_DB: vitalpro
      POSTGRES_USER: vitalpro
      POSTGRES_PASSWORD: vitalpro
    ports:
      - "5433:5432"
    volumes:
      - vitalpro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalpro -d vitalpro"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  vitalpro-postgres-data:
