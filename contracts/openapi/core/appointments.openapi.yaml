openapi: 3.1.0
info:
  title: VitalPro Core Appointments API
  version: 1.0.0
  summary: Initial external contract for appointments module.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /api/v1/appointments:
    get:
      operationId: listAppointments
      summary: List appointments ordered by start time ascending (max 100)
      tags:
        - appointments
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: limit
          required: false
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                          enum:
                            - scheduled
                            - completed
                            - cancelled
                        serviceName:
                          type: string
                        clientName:
                          type: string
                        startsAt:
                          type: string
                        durationMinutes:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                      required:
                        - id
                        - status
                        - serviceName
                        - clientName
                        - startsAt
                        - durationMinutes
                      additionalProperties: false
                  limit:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                required:
                  - items
                  - limit
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  detail:
                    type: string
                  instance:
                    type: string
                required:
                  - type
                  - title
                  - status
                additionalProperties: false
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  detail:
                    type: string
                  instance:
                    type: string
                required:
                  - type
                  - title
                  - status
                additionalProperties: false
  /api/v1/appointments/{appointmentId}:
    get:
      operationId: getAppointmentById
      summary: Get an appointment by id
      tags:
        - appointments
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: appointmentId
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum:
                      - scheduled
                      - completed
                      - cancelled
                  serviceName:
                    type: string
                  clientName:
                    type: string
                  startsAt:
                    type: string
                  durationMinutes:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                required:
                  - id
                  - status
                  - serviceName
                  - clientName
                  - startsAt
                  - durationMinutes
                additionalProperties: false
        "401":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  detail:
                    type: string
                  instance:
                    type: string
                required:
                  - type
                  - title
                  - status
                additionalProperties: false
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  detail:
                    type: string
                  instance:
                    type: string
                required:
                  - type
                  - title
                  - status
                additionalProperties: false
        "500":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  detail:
                    type: string
                  instance:
                    type: string
                required:
                  - type
                  - title
                  - status
                additionalProperties: false
servers:
  - url: https://api.vitalpro.example
security:
  - bearerAuth: []
