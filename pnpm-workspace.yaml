packages:
  - apps/*
  - libs/*
  - tools

# Version-unification + transitive-dependency SECURITY pins. These are
# load-bearing: each forces a safe/unified version of a package some dependency
# would otherwise resolve lower. Do NOT remove an entry based on a name scan.
# Before removing one, prove it is no longer needed: drop it, run
# `pnpm update <pkg>`, and confirm the lockfile still resolves to a safe version
# (scoped names like '@scope/pkg' are quoted in pnpm-lock.yaml).
overrides:
  '@types/react': 19.2.17
  react: 19.2.7
  react-dom: 19.2.7
  axios: 1.16.0
  follow-redirects: 1.16.0
  flatted: 3.4.2
  qs: 6.15.2
  yaml: 2.8.4
  brace-expansion: 5.0.6
  tmp: 0.2.7
  uuid: 11.1.1
  ws: 8.21.0
  form-data: 4.0.6
  # Required: @prisma/dev pins @hono/node-server to exactly 1.19.11 (vulnerable,
  # GHSA-92pp-h63x-v22m) and Prisma ships no fix yet. Remove when Prisma bumps it.
  '@hono/node-server': ^1.19.13
  hono: 4.12.25
  js-yaml: 4.2.0
  postcss: ^8.5.15
  undici: 7.28.0

allowBuilds:
  '@parcel/watcher': false
  '@prisma/engines': true
  '@swc/core': true
  core-js: true
  cpu-features: true
  esbuild: true
  less: false
  nx: true
  prisma: true
  sharp: false
  ssh2: true
  unrs-resolver: true
