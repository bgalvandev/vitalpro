name: AI Codex Fix CI

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to fix"
        required: true
        type: string
      reason:
        description: "Optional reason or failing context"
        required: false
        type: string
      model:
        description: "Codex model override"
        required: false
        default: "gpt-5.5"
        type: string
      effort:
        description: "Reasoning effort"
        required: false
        default: "high"
        type: choice
        options:
          - low
          - medium
          - high
          - xhigh

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fix-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number(`${{ inputs.pr_number }}`);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid PR number: ${{ inputs.pr_number }}`);
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput("pr_number", String(pr.data.number));
            core.setOutput("head_ref", pr.data.head.ref);
            core.setOutput("base_ref", pr.data.base.ref);
            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput("title", pr.data.title);

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Codex fix task
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: workspace-write
          model: ${{ inputs.model }}
          effort: ${{ inputs.effort }}
          prompt: |
            Fix CI failures for this pull request in the VitalPro monorepo.

            Pull request context:
            - Number: #${{ steps.pr.outputs.pr_number }}
            - Title: ${{ steps.pr.outputs.title }}
            - Branch: ${{ steps.pr.outputs.head_ref }}
            - Base: ${{ steps.pr.outputs.base_ref }}
            - Head SHA: ${{ steps.pr.outputs.head_sha }}
            - Reason/context: ${{ inputs.reason }}

            Repository constraints:
            - Follow AGENTS.md strictly.
            - Keep changes minimal and focused on failures.
            - Keep Clean Architecture boundaries and Core/Health rules.
            - Keep OpenAPI contracts synchronized with external API behavior.

            Validation workflow:
            1. Run pnpm run ai:guard.
            2. Run focused checks first.
            3. Run pnpm run check before finalizing.

      - name: Run quality checks
        run: pnpm run check

      - name: Create fix PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ai/codex-fix-ci-${{ github.run_id }}
          base: ${{ steps.pr.outputs.head_ref }}
          delete-branch: true
          commit-message: "fix(ci): codex manual fix for PR #${{ steps.pr.outputs.pr_number }}"
          title: "fix(ci): codex manual fix for PR #${{ steps.pr.outputs.pr_number }}"
          body: |
            Automated CI fix generated by `AI Codex Fix CI`.

            Source pull request:
            - #${{ steps.pr.outputs.pr_number }}
            - Branch: `${{ steps.pr.outputs.head_ref }}`

            Requested reason/context:
            - `${{ inputs.reason }}`

            Validation executed:
            - pnpm run check
          labels: |
            ai
            automated
            ci-fix
          sign-commits: true

      - name: Comment fix result
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number(`${{ steps.pr.outputs.pr_number }}`);
            const fixPrUrl = `${{ steps.cpr.outputs.pull-request-url }}`;
            const body = fixPrUrl
              ? `Codex manual CI fix created: ${fixPrUrl}`
              : "Codex did not produce a diff for manual CI fix.";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
