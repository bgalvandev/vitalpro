name: AI Codex Auto-Fix CI

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target PR
        id: target
        uses: actions/github-script@v8
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            if (workflowRun.event !== "pull_request") {
              core.setOutput("enabled", "false");
              core.setOutput("reason", "Workflow run is not linked to a pull request.");
              return;
            }

            const [linkedPr] = workflowRun.pull_requests || [];
            if (!linkedPr) {
              core.setOutput("enabled", "false");
              core.setOutput("reason", "No pull request associated with failed CI run.");
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: linkedPr.number,
            });

            const labels = (pr.data.labels || []).map((label) => label.name);
            const isAiManaged = labels.includes("ai") || labels.includes("automated");
            if (!isAiManaged) {
              core.setOutput("enabled", "false");
              core.setOutput("reason", "PR is not AI-managed (missing ai/automated labels).");
              return;
            }

            const isAutoFixBranch = pr.data.head.ref.startsWith("ai/codex-autofix-");
            if (isAutoFixBranch) {
              core.setOutput("enabled", "false");
              core.setOutput("reason", "Skipping auto-fix loop on ai/codex-autofix-* branches.");
              return;
            }

            core.setOutput("enabled", "true");
            core.setOutput("reason", "AI-managed PR with failed CI detected.");
            core.setOutput("pr_number", String(pr.data.number));
            core.setOutput("head_ref", pr.data.head.ref);
            core.setOutput("base_ref", pr.data.base.ref);
            core.setOutput("run_url", workflowRun.html_url);
            core.setOutput("run_id", String(workflowRun.id));

      - name: Stop when auto-fix is not enabled
        if: ${{ steps.target.outputs.enabled != 'true' }}
        run: echo "${{ steps.target.outputs.reason }}"

      - name: Check OpenAI key availability
        if: ${{ steps.target.outputs.enabled == 'true' }}
        id: key_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when OpenAI key is missing
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key != 'true' }}
        run: echo "Skipping auto-fix because OPENAI_API_KEY is not configured."

      - name: Checkout failed PR branch
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.head_ref }}

      - name: Setup pnpm
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Run Codex auto-fix
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: workspace-write
          model: gpt-5.5
          effort: high
          prompt: |
            Fix the CI failure for this AI-managed PR in the VitalPro monorepo.

            Context:
            - Pull request #${{ steps.target.outputs.pr_number }}
            - Failed CI run: ${{ steps.target.outputs.run_url }}
            - Source branch: ${{ steps.target.outputs.head_ref }}
            - Base branch: ${{ steps.target.outputs.base_ref }}

            Required constraints:
            - Follow AGENTS.md strictly.
            - Fix only the failing scope with minimal changes.
            - Keep Clean Architecture boundaries and Core/Health dependency rules.
            - Keep external API behavior and OpenAPI contracts synchronized.

            Validation workflow:
            1. Run pnpm run ai:guard.
            2. Run focused checks for changed projects.
            3. Run pnpm run check before finalizing.

      - name: Run quality checks
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        run: pnpm run check

      - name: Create auto-fix pull request
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ai/codex-autofix-${{ github.run_id }}
          base: ${{ steps.target.outputs.head_ref }}
          delete-branch: true
          commit-message: "fix(ci): auto-fix failed checks for PR #${{ steps.target.outputs.pr_number }}"
          title: "fix(ci): auto-fix failed checks for PR #${{ steps.target.outputs.pr_number }}"
          body: |
            Automated CI auto-fix generated by `AI Codex Auto-Fix CI`.

            Source:
            - Failed run: ${{ steps.target.outputs.run_url }}
            - Pull request: #${{ steps.target.outputs.pr_number }}

            Validation executed:
            - pnpm run check
          labels: |
            ai
            automated
            ci-fix
          sign-commits: true

      - name: Report auto-fix result
        if: ${{ steps.target.outputs.enabled == 'true' && steps.key_check.outputs.has_key == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number(`${{ steps.target.outputs.pr_number }}`);
            const fixPrUrl = `${{ steps.cpr.outputs.pull-request-url }}`;
            const body = fixPrUrl
              ? `Codex created an auto-fix PR: ${fixPrUrl}`
              : "Codex did not produce a diff for auto-fix.";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
