name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote from staging (for example: sha-<commit-sha>)"
        required: true
        default: "staging"
      run_smoke_tests:
        description: "Run post-build smoke checks before deployment"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate-image:
    name: Validate source image tag
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/core-api
      SOURCE_TAG: ${{ inputs.image_tag }}
    outputs:
      source_ref: ${{ steps.validate.outputs.source_ref }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure source image exists
        id: validate
        run: |
          source_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SOURCE_TAG }}"
          docker buildx imagetools inspect "$source_ref" >/dev/null
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

  deploy:
    name: Promote core-api image to production
    needs:
      - validate-image
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/core-api
    environment:
      name: production
    permissions:
      contents: read
      packages: write
      deployments: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote source image tag
        id: promote
        run: |
          timestamp="$(date -u +%Y%m%d%H%M%S)"
          source_ref="${{ needs.validate-image.outputs.source_ref }}"
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${timestamp}" \
            "$source_ref"
          echo "release_tag=prod-${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Production smoke check
        if: ${{ inputs.run_smoke_tests }}
        run: |
          docker run -d --name core-api-production --rm -p 3300:3000 "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production"
          for i in $(seq 1 30); do
            if curl -fsS -H "Authorization: Bearer local-test-token" http://127.0.0.1:3300/api/v1/appointments/apt-001 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs core-api-production
          exit 1

      - name: Stop production container
        if: ${{ always() && inputs.run_smoke_tests }}
        run: docker rm -f core-api-production || true
