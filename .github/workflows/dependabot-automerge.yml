name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  merge-minor-and-patch:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate and merge Dependabot PR
        uses: actions/github-script@v8
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            if (workflowRun.event !== "pull_request") {
              core.info("Skipping: successful run is not associated with pull_request.");
              return;
            }

            const [linkedPr] = workflowRun.pull_requests || [];
            if (!linkedPr) {
              core.info("Skipping: no linked pull request.");
              return;
            }

            const { owner, repo } = context.repo;
            const prNumber = linkedPr.number;
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (pr.data.state !== "open") {
              core.info(`Skipping: PR #${prNumber} is not open.`);
              return;
            }

            if (pr.data.user?.login !== "dependabot[bot]") {
              core.info(`Skipping: PR #${prNumber} author is not dependabot[bot].`);
              return;
            }

            const title = pr.data.title || "";
            const body = pr.data.body || "";
            const isGroupedUpdate = /bump the .* group with \d+ updates/i.test(title);

            function parseSemver(value) {
              const normalized = String(value).replace(/^[^\d]*/, "");
              const semverMatch = normalized.match(/^(\d+)\.(\d+)\.(\d+)/);
              if (!semverMatch) return null;
              return {
                major: Number(semverMatch[1]),
                minor: Number(semverMatch[2]),
                patch: Number(semverMatch[3]),
              };
            }

            if (!isGroupedUpdate) {
              const versionMatchFromTitle = title.match(/ from ([^ ]+) to ([^ ]+)/i);
              const versionMatchFromBody = body.match(/ from ([^ ]+) to ([^ ]+)/i);
              const versionMatch = versionMatchFromTitle || versionMatchFromBody;

              if (!versionMatch) {
                core.info(`Skipping: unable to parse semver range from title/body for PR #${prNumber}.`);
                return;
              }

              const fromVersion = parseSemver(versionMatch[1]);
              const toVersion = parseSemver(versionMatch[2]);
              if (!fromVersion || !toVersion) {
                core.info(`Skipping: non-semver or unparsable update in PR #${prNumber}.`);
                return;
              }

              const isMajor = toVersion.major > fromVersion.major;
              if (isMajor) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: [
                    "Major dependency update detected.",
                    "",
                    "- Auto-merge policy: disabled for major updates.",
                    "- Action required: manual review and merge.",
                  ].join("\n"),
                });
                core.info(`PR #${prNumber} is a major update. Leaving for manual merge.`);
                return;
              }
            }

            const maxAttempts = 12;
            const retryDelayMs = 20000;
            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              try {
                const result = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: "squash",
                  commit_title: title,
                });
                core.info(`Merged PR #${prNumber}: ${result.data.sha}`);
                return;
              } catch (error) {
                const message = error?.message || String(error);
                const retryable =
                  /required status check .* in progress/i.test(message) ||
                  /required status checks? are expected/i.test(message) ||
                  /base branch policy prohibits the merge/i.test(message) ||
                  /is not mergeable/i.test(message);

                if (retryable && attempt < maxAttempts) {
                  core.warning(
                    `Attempt ${attempt}/${maxAttempts} could not merge PR #${prNumber}: ${message}. Retrying in ${retryDelayMs / 1000}s...`,
                  );
                  await new Promise((resolve) => setTimeout(resolve, retryDelayMs));
                  continue;
                }

                core.warning(`Failed to auto-merge PR #${prNumber}: ${message}`);
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: [
                    "Auto-merge attempt for this Dependabot minor/patch update failed.",
                    "",
                    `- Reason: ${message}`,
                    "- Action required: manual review/merge.",
                  ].join("\n"),
                });
                return;
              }
            }
