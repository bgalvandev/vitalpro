name: Deploy Staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish and deploy core-api image to staging
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/core-api
      IMAGE_TAG_SHA: sha-${{ github.event.workflow_run.head_sha }}
    environment:
      name: staging
    permissions:
      contents: read
      packages: write
      deployments: write
    steps:
      - name: Check staging database configuration
        id: staging-config
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "has_database_url=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping staging deploy because STAGING_DATABASE_URL is not configured."
            exit 0
          fi
          echo "has_database_url=true" >> "$GITHUB_OUTPUT"

      - name: Checkout successful main commit
        if: ${{ steps.staging-config.outputs.has_database_url == 'true' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        if: ${{ steps.staging-config.outputs.has_database_url == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        if: ${{ steps.staging-config.outputs.has_database_url == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: Run staging migrations
        if: ${{ steps.staging-config.outputs.has_database_url == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "STAGING_DATABASE_URL secret is required." >&2
            exit 1
          fi
          docker run --rm \
            -e DATABASE_URL \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging" \
            pnpm run prisma:migrate:deploy

      - name: Staging smoke check
        if: ${{ steps.staging-config.outputs.has_database_url == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "STAGING_DATABASE_URL secret is required." >&2
            exit 1
          fi
          docker run -d --name core-api-staging --rm -p 3300:3000 -e DATABASE_URL "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"
          for i in $(seq 1 30); do
            status="$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer local-test-token" http://127.0.0.1:3300/api/v1/appointments/deploy-smoke-missing || true)"
            if [ "$status" = "404" ]; then
              exit 0
            fi
            sleep 1
          done
          docker logs core-api-staging
          exit 1

      - name: Stop staging container
        if: ${{ always() && steps.staging-config.outputs.has_database_url == 'true' }}
        run: docker rm -f core-api-staging || true
