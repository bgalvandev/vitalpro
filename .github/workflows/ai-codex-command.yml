name: AI Codex Command

on:
  issue_comment:
    types:
      - created

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dispatch-from-comment:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/codex') }}
    runs-on: ubuntu-latest
    steps:
      - name: Authorize commenter
        id: authorize
        uses: actions/github-script@v8
        with:
          script: |
            const association = context.payload.comment.author_association;
            const username = context.payload.comment.user.login;

            let permissionLevel = "none";
            try {
              const permissionResponse = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username,
              });
              permissionLevel = permissionResponse.data.permission || "none";
            } catch {
              permissionLevel = "none";
            }

            const allowedPermissions = new Set(["write", "maintain", "admin"]);
            const authorized = allowedPermissions.has(permissionLevel);
            core.setOutput("authorized", authorized ? "true" : "false");
            core.setOutput("association", association);
            core.setOutput("permission", permissionLevel);

      - name: Reject unauthorized command
        if: ${{ steps.authorize.outputs.authorized != 'true' }}
        uses: actions/github-script@v8
        env:
          AUTHOR_ASSOCIATION: ${{ steps.authorize.outputs.association }}
          AUTHOR_PERMISSION: ${{ steps.authorize.outputs.permission }}
        with:
          script: |
            const association = process.env.AUTHOR_ASSOCIATION || "UNKNOWN";
            const permission = process.env.AUTHOR_PERMISSION || "none";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Command rejected. Current permission \`${permission}\` (association: \`${association}\`) is not allowed to run \`/codex\`.`,
            });
            core.setFailed("Unauthorized /codex command.");

      - name: Parse command
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.comment.body.trim();
            const firstLine = body.split("\n").map((line) => line.trim()).find(Boolean) || "";
            const commandMatch = firstLine.match(/^\/codex\b\s*(.*)$/i);

            if (!commandMatch) {
              core.setFailed("Unsupported /codex command format.");
              return;
            }

            let payload = commandMatch[1].trim();
            const defaults = {
              model: "gpt-5.5",
              effort: "medium",
              create_pr: "true",
            };

            const modelMatch = payload.match(/--model=(\S+)/);
            if (modelMatch) {
              defaults.model = modelMatch[1];
              payload = payload.replace(modelMatch[0], "").trim();
            }

            const effortMatch = payload.match(/--effort=(low|medium|high|xhigh)\b/i);
            if (effortMatch) {
              defaults.effort = effortMatch[1].toLowerCase();
              payload = payload.replace(effortMatch[0], "").trim();
            }

            const createPrMatch = payload.match(/--create-pr=(true|false)\b/i);
            if (createPrMatch) {
              defaults.create_pr = createPrMatch[1].toLowerCase();
              payload = payload.replace(createPrMatch[0], "").trim();
            }

            if (!payload) {
              core.setFailed("Missing task. Use `/codex <task>`.");
              return;
            }

            const fixCiMatch = payload.match(/^fix-ci\b/i);
            if (fixCiMatch) {
              const reason = payload.replace(/^fix-ci\b/i, "").trim();
              core.setOutput("mode", "fix-ci");
              core.setOutput("task", "");
              core.setOutput("model", defaults.model);
              core.setOutput("effort", defaults.effort);
              core.setOutput("create_pr", "true");
              core.setOutput("base_ref", "");
              core.setOutput("target_mode", "");
              core.setOutput("head_repo", "");
              core.setOutput("reason", reason || "Triggered from /codex fix-ci command.");
              core.setOutput("pr_number", String(context.issue.number));
              return;
            }

            const pull = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const headRepo = pull.data.head.repo?.full_name;
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const isFork = headRepo && headRepo !== baseRepo;

            if (isFork) {
              core.setOutput("task", "");
              core.setOutput("model", defaults.model);
              core.setOutput("effort", defaults.effort);
              core.setOutput("create_pr", defaults.create_pr);
              core.setOutput("base_ref", pull.data.base.ref);
              core.setOutput("target_mode", "fork");
              core.setOutput("head_repo", headRepo || "");
              core.setOutput("mode", "reject-fork");
              core.setOutput("reason", "Command rejected on fork PR for security.");
              core.setOutput("pr_number", String(context.issue.number));
              return;
            }

            core.setOutput("task", payload);
            core.setOutput("model", defaults.model);
            core.setOutput("effort", defaults.effort);
            core.setOutput("create_pr", defaults.create_pr);
            core.setOutput("base_ref", pull.data.head.ref);
            core.setOutput("target_mode", "head");
            core.setOutput("head_repo", headRepo || baseRepo);
            core.setOutput("mode", "implement");
            core.setOutput("reason", "");
            core.setOutput("pr_number", String(context.issue.number));

      - name: Dispatch AI Codex implementation workflow
        if: ${{ steps.parse.outputs.mode == 'implement' }}
        uses: actions/github-script@v8
        env:
          DISPATCH_TASK: ${{ steps.parse.outputs.task }}
          DISPATCH_BASE_REF: ${{ steps.parse.outputs.base_ref }}
          DISPATCH_MODEL: ${{ steps.parse.outputs.model }}
          DISPATCH_EFFORT: ${{ steps.parse.outputs.effort }}
          DISPATCH_CREATE_PR: ${{ steps.parse.outputs.create_pr }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ai-codex-dispatch.yml",
              ref: "main",
              inputs: {
                task: process.env.DISPATCH_TASK,
                base_ref: process.env.DISPATCH_BASE_REF,
                model: process.env.DISPATCH_MODEL,
                effort: process.env.DISPATCH_EFFORT,
                create_pr: process.env.DISPATCH_CREATE_PR,
              },
            });

      - name: Dispatch AI Codex fix-ci workflow
        if: ${{ steps.parse.outputs.mode == 'fix-ci' }}
        uses: actions/github-script@v8
        env:
          FIX_PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          FIX_REASON: ${{ steps.parse.outputs.reason }}
          FIX_MODEL: ${{ steps.parse.outputs.model }}
          FIX_EFFORT: ${{ steps.parse.outputs.effort }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ai-codex-fix-ci.yml",
              ref: "main",
              inputs: {
                pr_number: process.env.FIX_PR_NUMBER,
                reason: process.env.FIX_REASON,
                model: process.env.FIX_MODEL,
                effort: process.env.FIX_EFFORT,
              },
            });

      - name: Acknowledge implement command
        if: ${{ steps.parse.outputs.mode == 'implement' }}
        uses: actions/github-script@v8
        env:
          ACK_TASK: ${{ steps.parse.outputs.task }}
          ACK_MODEL: ${{ steps.parse.outputs.model }}
          ACK_EFFORT: ${{ steps.parse.outputs.effort }}
          ACK_CREATE_PR: ${{ steps.parse.outputs.create_pr }}
          ACK_TARGET_MODE: ${{ steps.parse.outputs.target_mode }}
          ACK_BASE_REF: ${{ steps.parse.outputs.base_ref }}
          ACK_HEAD_REPO: ${{ steps.parse.outputs.head_repo }}
        with:
          script: |
            const task = process.env.ACK_TASK || "";
            const model = process.env.ACK_MODEL || "";
            const effort = process.env.ACK_EFFORT || "";
            const createPr = process.env.ACK_CREATE_PR || "";
            const mode = process.env.ACK_TARGET_MODE || "";
            const baseRef = process.env.ACK_BASE_REF || "";
            const headRepo = process.env.ACK_HEAD_REPO || "";
            const modeDetail = mode === "head"
              ? `- target: PR head branch \`${baseRef}\``
              : `- target: PR base branch \`${baseRef}\` (fork PR detected: \`${headRepo}\`)`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Codex task dispatched.",
                "",
                `- task: ${task}`,
                `- model: ${model}`,
                `- effort: ${effort}`,
                `- create_pr: ${createPr}`,
                modeDetail,
              ].join("\n"),
            });

      - name: Acknowledge fix-ci command
        if: ${{ steps.parse.outputs.mode == 'fix-ci' }}
        uses: actions/github-script@v8
        env:
          ACK_FIX_REASON: ${{ steps.parse.outputs.reason }}
          ACK_FIX_MODEL: ${{ steps.parse.outputs.model }}
          ACK_FIX_EFFORT: ${{ steps.parse.outputs.effort }}
        with:
          script: |
            const reason = process.env.ACK_FIX_REASON || "";
            const model = process.env.ACK_FIX_MODEL || "";
            const effort = process.env.ACK_FIX_EFFORT || "";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Codex fix-ci task dispatched.",
                "",
                `- model: ${model}`,
                `- effort: ${effort}`,
                `- reason: ${reason}`,
              ].join("\n"),
            });

      - name: Reject fork PR command
        if: ${{ steps.parse.outputs.mode == 'reject-fork' }}
        uses: actions/github-script@v8
        env:
          FORK_REPO: ${{ steps.parse.outputs.head_repo }}
        with:
          script: |
            const forkRepo = process.env.FORK_REPO || "unknown";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Command rejected.",
                "",
                `- reason: fork PRs are not eligible for /codex execution`,
                `- head repository: ${forkRepo}`,
              ].join("\n"),
            });
