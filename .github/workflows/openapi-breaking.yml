name: OpenAPI Breaking Changes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch base branch
        run: git fetch --depth=1 origin "${{ github.base_ref }}"

      - name: Check base contract presence
        id: base_contract
        run: |
          if git cat-file -e "origin/${{ github.base_ref }}:contracts/openapi/core/appointments.openapi.yaml" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Advisory until the API is declared stable (v1.0): the contract has no
      # external consumers yet, so intentional pre-1.0 breaking changes are
      # expected. The step still reports breaks in the logs/annotations but does
      # NOT block the merge. To re-enable blocking once the API is stable, remove
      # `continue-on-error`. See docs/adr/0001-openapi-breaking-change-policy.md.
      - name: Detect breaking changes in appointments contract (advisory)
        if: steps.base_contract.outputs.exists == 'true'
        continue-on-error: true
        uses: oasdiff/oasdiff-action/breaking@v0.0.46
        with:
          base: "origin/${{ github.base_ref }}:contracts/openapi/core/appointments.openapi.yaml"
          revision: "HEAD:contracts/openapi/core/appointments.openapi.yaml"
          fail-on: WARN

      - name: Skip check on first contract introduction
        if: steps.base_contract.outputs.exists != 'true'
        run: echo "Base branch has no appointments contract yet. Breaking-change diff skipped."
