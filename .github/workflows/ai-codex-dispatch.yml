name: AI Codex Dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task for Codex"
        required: true
        type: string
      base_ref:
        description: "Base branch or ref"
        required: true
        default: "main"
        type: string
      model:
        description: "Codex model override"
        required: false
        default: "gpt-5.5"
        type: string
      effort:
        description: "Reasoning effort"
        required: false
        default: "medium"
        type: choice
        options:
          - low
          - medium
          - high
          - xhigh
      create_pr:
        description: "Create PR if changes are produced"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  codex-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build AI task pack
        run: pnpm run ai:task-pack -- --task "${{ inputs.task }}"

      - name: Run Codex task
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: workspace-write
          model: ${{ inputs.model }}
          effort: ${{ inputs.effort }}
          prompt: |
            Execute this task in the VitalPro monorepo:
            ${{ inputs.task }}

            Mandatory constraints:
            - Follow AGENTS.md and keep Clean Architecture boundaries.
            - Do not introduce Core -> Health dependencies.
            - Keep external API behavior and OpenAPI contracts synchronized.
            - Keep changes scoped to one logical objective.

            Validation workflow:
            1. Run pnpm run ai:guard.
            2. Run focused tests for changed projects.
            3. If uncertain, run pnpm run check.

            Use tmp/ai/task-pack.md as context reference.

      - name: Run AI guard
        run: pnpm run ai:guard

      - name: Run quality checks
        run: pnpm run check

      - name: Create pull request
        if: ${{ inputs.create_pr }}
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ai/codex-dispatch
          delete-branch: true
          commit-message: "chore(ai): apply codex dispatch task"
          title: "chore(ai): ${{ inputs.task }}"
          body: |
            Automated change generated by `AI Codex Dispatch`.

            Task:
            ${{ inputs.task }}

            Validation executed:
            - pnpm run ai:guard
            - pnpm run check
          labels: |
            ai
            automated
          sign-commits: true

      - name: Report pull request result
        if: ${{ inputs.create_pr }}
        run: |
          if [ -n "${{ steps.cpr.outputs.pull-request-number }}" ]; then
            echo "Created or updated PR #${{ steps.cpr.outputs.pull-request-number }}"
            echo "URL: ${{ steps.cpr.outputs.pull-request-url }}"
          else
            echo "No diff produced. Pull request not created."
          fi
